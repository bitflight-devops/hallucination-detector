name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions: {}

jobs:
  # =============================================================================
  # JavaScript: Biome linting and formatting
  # =============================================================================
  lint-js:
    name: JS / Biome
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: latest

      - name: Run Biome
        run: biome ci .

  # =============================================================================
  # Markdown: markdownlint
  # =============================================================================
  lint-markdown:
    name: Markdown / markdownlint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Run markdownlint
        run: npx markdownlint-cli2 "**/*.md" "#node_modules"

  # =============================================================================
  # Prettier: YAML + Markdown formatting
  # =============================================================================
  lint-prettier:
    name: Prettier
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Check formatting
        run: npx prettier --check "**/*.{yml,yaml,md}"

  # =============================================================================
  # Shell: shellcheck
  # =============================================================================
  lint-shell:
    name: Shell / shellcheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Find shell scripts
        id: find-scripts
        run: |
          scripts=$(find . -type f \( -name "*.sh" -o -name "*.bash" \) -not -path "./node_modules/*" -not -path "./.git/*" -not -path "./.husky/*" 2>/dev/null || true)
          shebang_scripts=$(grep -rlE "^#!.*/(ba)?sh" . 2>/dev/null | grep -v node_modules | grep -v "^./.git/" | grep -v "^./.husky/" || true)
          all_scripts=$(echo -e "$scripts\n$shebang_scripts" | sort -u | grep -v "^$" || true)

          if [ -z "$all_scripts" ]; then
            echo "has_scripts=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_scripts=true" >> "$GITHUB_OUTPUT"
            echo "scripts<<EOF" >> "$GITHUB_OUTPUT"
            echo "$all_scripts" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Run shellcheck
        if: steps.find-scripts.outputs.has_scripts == 'true'
        run: echo "${{ steps.find-scripts.outputs.scripts }}" | xargs shellcheck -f gcc

  # =============================================================================
  # Node.js: tests
  # =============================================================================
  test-node:
    name: JS / Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run tests with coverage
        run: pnpm test --coverage 2>&1 | tee /tmp/test-output.txt; EXIT_CODE=${PIPESTATUS[0]}; exit $EXIT_CODE

      - name: Upload coverage summary to job summary
        if: always()
        run: |
          if grep -q "Coverage report from" /tmp/test-output.txt 2>/dev/null; then
            echo "## Test Coverage" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            sed -n '/Coverage report from/,/^$/p' /tmp/test-output.txt | head -20 >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

  # =============================================================================
  # Bundle: verify skill bundle builds successfully
  # =============================================================================
  bundle:
    name: Bundle / Verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build bundle
        run: ./scripts/bundle.sh

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: hallucination-detector-skill
          path: dist/hallucination-detector.skill
          retention-days: 7

  # =============================================================================
  # Quality gate
  # =============================================================================
  quality-gate:
    name: Quality Gate
    if: always()
    needs:
      - lint-js
      - lint-markdown
      - lint-prettier
      - lint-shell
      - test-node
      - bundle
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
