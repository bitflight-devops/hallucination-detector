# .dh/skill_discovery.yaml
# Generated by /dh:setup-skill-discovery wizard (AUTO_MODE)
# Review and adjust entries as needed.

skill_discovery: auto # auto | suggest | off

always_use_skills: [] # unconditional; 0-2 recommended

prefer_skills: [] # tiebreaker advisory; not added unconditionally

avoid_skills: [] # never inject; overrides all rules

skill_rules:
  # AUTO_MODE: review and adjust as needed
  - when: 'involves Claude Code hooks, stop hooks, session hooks, or hook scripts (.cjs)'
    use:
      - plugin-creator:hook-creator # hook script conventions, .cjs, hookSpecificOutput schema
      - plugin-creator:hooks-io-api # stdin/stdout contract for Claude Code hooks
      - plugin-creator:hooks-guide # hook event types, registration, lifecycle
    # Reason: project is a Claude Code plugin with Stop and SessionStart hooks in CJS

  # AUTO_MODE: review and adjust as needed
  - when: 'involves regex pattern detection, trigger matching, or findTriggerMatches'
    use: []
    # Reason: core detection logic is project-specific; no external skill covers it
    # The javascript-pro agent (.claude/agents/javascript-pro.md) handles CJS implementation

  # AUTO_MODE: review and adjust as needed
  - when: 'involves Vitest tests, test files (.test.cjs), or test coverage'
    use: []
    # Reason: tests follow vitest.config.cjs patterns; javascript-pro agent handles test authoring
